<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Signal - Analisis Saham Real-Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .last-update {
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 0.9em;
            color: #666;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filter-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #667eea;
            color: white;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        /* Search Box */
        .search-box {
            margin-top: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9em;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #f8f9ff;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-strong-buy { background: #ff4757; color: white; }
        .status-buy { background: #00b894; color: white; }
        .status-watch { background: #fdcb6e; color: #333; }
        .status-avoid { background: #95a5a6; color: white; }

        /* Score Indicator */
        .score {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.85em;
        }

        .score-high { background: #ff4757; color: white; }
        .score-mid { background: #fdcb6e; color: #333; }
        .score-low { background: #dfe6e9; color: #333; }

        /* Loading & Error */
        .loading, .error {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
        }

        .loading {
            font-size: 1.2em;
            color: #667eea;
        }

        .error {
            color: #ff4757;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }
            
            th, td {
                padding: 10px;
                font-size: 0.85em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Positive/Negative Colors */
        .positive {
            color: #00b894;
            font-weight: 600;
        }

        .negative {
            color: #ff4757;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 SOVEREIGN SIGNAL</h1>
            <div class="subtitle">Analisis Akumulasi & Momentum Saham Real-Time</div>
            <div class="last-update" id="lastUpdate">Memuat data...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Saham</div>
                <div class="value" id="totalStocks">-</div>
            </div>
            <div class="stat-card">
                <div class="label">🔥 STRONG BUY</div>
                <div class="value" id="strongBuyCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">✅ BUY</div>
                <div class="value" id="buyCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">⏳ WATCH</div>
                <div class="value" id="watchCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">💀 AVOID</div>
                <div class="value" id="avoidCount">-</div>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title">Filter Sinyal</div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="🔥 STRONG BUY">🔥 Strong Buy</button>
                <button class="filter-btn" data-filter="✅ BUY">✅ Buy</button>
                <button class="filter-btn" data-filter="⏳ WATCH">⏳ Watch</button>
                <button class="filter-btn" data-filter="💀 AVOID">💀 Avoid</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari berdasarkan kode saham...">
            </div>
        </div>

        <div class="table-container">
            <div id="tableContent">
                <div class="loading">
                    <div class="spinner"></div>
                    Mengambil data dari server...
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentFilter = 'all';
        let currentSearch = '';

        // Fetch data dari API
        async function fetchData() {
            try {
                const response = await fetch('/api/signals');
                if (!response.ok) throw new Error('Gagal mengambil data');
                const data = await response.json();
                allData = data;
                updateStats();
                renderTable();
                updateLastUpdate();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableContent').innerHTML = `
                    <div class="error">
                        <strong>⚠️ Error</strong><br>
                        Gagal memuat data. Pastikan server berjalan dan koneksi internet aktif.
                    </div>
                `;
            }
        }

        // Update statistik
        function updateStats() {
            const total = allData.length;
            const strongBuy = allData.filter(d => d.status === '🔥 STRONG BUY').length;
            const buy = allData.filter(d => d.status === '✅ BUY').length;
            const watch = allData.filter(d => d.status === '⏳ WATCH').length;
            const avoid = allData.filter(d => d.status === '💀 AVOID').length;

            document.getElementById('totalStocks').textContent = total;
            document.getElementById('strongBuyCount').textContent = strongBuy;
            document.getElementById('buyCount').textContent = buy;
            document.getElementById('watchCount').textContent = watch;
            document.getElementById('avoidCount').textContent = avoid;
        }

        // Filter dan search data
        function getFilteredData() {
            let filtered = allData;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(d => d.status === currentFilter);
            }
            
            if (currentSearch) {
                filtered = filtered.filter(d => 
                    d.ticker.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            
            return filtered;
        }

        // Render tabel
        function renderTable() {
            const filteredData = getFilteredData();
            
            if (filteredData.length === 0) {
                document.getElementById('tableContent').innerHTML = `
                    <div style="text-align: center; padding: 50px; color: #666;">
                        Tidak ada data yang sesuai dengan filter
                    </div>
                `;
                return;
            }

            const tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Kode Saham</th>
                            <th>Harga</th>
                            <th>Change %</th>
                            <th>Market Cap</th>
                            <th>P/E Ratio</th>
                            <th>Volume Ratio</th>
                            <th>Skor</th>
                            <th>Sinyal</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredData.map(item => `
                            <tr>
                                <td><strong>${item.ticker}</strong></td>
                                <td>${item.price}</td>
                                <td class="${parseFloat(item.change_pct) > 0 ? 'positive' : 'negative'}">
                                    ${item.change_pct}
                                </td>
                                <td>${item.mcap}</td>
                                <td>${item.pe}</td>
                                <td>${item.vol_ratio}</td>
                                <td>
                                    <span class="score ${getScoreClass(item.score)}">
                                        ${item.score}
                                    </span>
                                </td>
                                <td>
                                    <span class="status-badge ${getStatusClass(item.status)}">
                                        ${item.status}
                                    </span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('tableContent').innerHTML = tableHtml;
        }

        function getScoreClass(score) {
            if (score >= 7) return 'score-high';
            if (score >= 4) return 'score-mid';
            return 'score-low';
        }

        function getStatusClass(status) {
            switch(status) {
                case '🔥 STRONG BUY': return 'status-strong-buy';
                case '✅ BUY': return 'status-buy';
                case '⏳ WATCH': return 'status-watch';
                default: return 'status-avoid';
            }
        }

        function updateLastUpdate() {
            const now = new Date();
            const formatted = now.toLocaleString('id-ID', {
                dateStyle: 'full',
                timeStyle: 'medium'
            });
            document.getElementById('lastUpdate').innerHTML = `📊 Last Update: ${formatted}`;
        }

        // Event Listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTable();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderTable();
        });

        // Auto refresh setiap 30 detik
        setInterval(() => {
            fetchData();
        }, 30000);

        // Initial load
        fetchData();
    </script>
</body>
</html>
